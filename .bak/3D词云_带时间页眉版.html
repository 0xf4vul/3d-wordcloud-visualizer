<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <title>3D词云可视化 · 时间版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; overflow: hidden; background: #000; color: #fff; }

        /* ① 时间页眉 */
        .time-header {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(76,175,80,0.4);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2000;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { font-size: 18px; font-weight: bold; color: #4CAF50; }
        .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
        .status-label { font-size: 12px; color: #aaa; }
        .clock { font-size: 22px; font-weight: bold; color: #4CAF50; font-family: 'Courier New', monospace; letter-spacing: 2px; }

        /* canvas 区域 */
        #canvas-wrap { position: fixed; top: 52px; left: 0; width: 100%; height: calc(100% - 52px); z-index: 1; }

        /* 面板通用 */
        .panel {
            position: fixed; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border: 1px solid rgba(76,175,80,0.35); border-radius: 10px;
            padding: 14px; color: #fff; z-index: 500;
            min-width: 210px; cursor: move; user-select: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: border-color .25s, box-shadow .25s;
        }
        .panel:hover { border-color: rgba(76,175,80,.8); box-shadow: 0 0 18px rgba(76,175,80,.25); }
        .panel-title { font-size: 13px; font-weight: bold; color: #4CAF50; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .panel-title .x { cursor: pointer; color: #666; font-size: 17px; transition: color .2s; }
        .panel-title .x:hover { color: #f44; }

        /* 上传面板 */
        #upload-panel { top: 68px; left: 18px; }
        .file-hint { color: #888; font-size: 11px; margin-bottom: 10px; line-height: 1.6; }
        .upload-btn {
            width: 100%; padding: 10px; background: #4CAF50; color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
            font-weight: 500; transition: background .25s, transform .1s;
        }
        .upload-btn:hover { background: #43a047; }
        .upload-btn:active { transform: scale(.97); }

        /* 进度条 */
        .progress-wrap { margin-top: 10px; display: none; }
        .progress-bg { background: rgba(255,255,255,.15); border-radius: 8px; overflow: hidden; height: 18px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg,#4CAF50,#8BC34A); width: 0%; transition: width .25s; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }

        /* 统计面板 */
        #stats-panel { top: 68px; right: 18px; display: none; }
        .stats-list { max-height: 220px; overflow-y: auto; font-size: 12px; }
        .stats-list::-webkit-scrollbar { width: 5px; }
        .stats-list::-webkit-scrollbar-thumb { background: rgba(76,175,80,.5); border-radius: 3px; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.08); }
        .stats-row:last-child { border-bottom: none; }
        .stats-rank { color: #888; min-width: 24px; }
        .stats-word { flex: 1; margin-left: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stats-count { color: #4CAF50; font-weight: bold; min-width: 36px; text-align: right; }

        /* ⑥ 磁吸图标 */
        .snap-icon {
            position: fixed; z-index: 600;
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            background: rgba(0,0,0,.65); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.15);
            cursor: pointer; opacity: .3;
            transition: opacity .25s, background .25s, border-color .25s;
            white-space: nowrap;
        }
        .snap-icon:hover { opacity: 1; background: rgba(76,175,80,.18); border-color: #4CAF50; }
        .snap-icon .si-emoji { font-size: 17px; }
        .snap-icon .si-text { font-size: 11px; color: #ccc; display: none; }
        .snap-icon:hover .si-text { display: inline; }

        /* toast 提示 */
        .toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(76,175,80,.5); border-radius: 8px;
            padding: 12px 22px; color: #fff; z-index: 3000;
            font-size: 14px; display: none;
            animation: fadeIn .3s;
        }
        .toast.error { border-color: #f44336; }
        @keyframes fadeIn { from{opacity:0;transform:translate(-50%,-12px)} to{opacity:1;transform:translate(-50%,0)} }

        /* 底部提示 */
        .hint-bar {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
            padding: 7px 18px; border-radius: 20px; font-size: 11px; color: #888; z-index: 400;
        }
    </style>
</head>
<body>

<!-- ① 时间页眉 -->
<div class="time-header">
    <div class="header-left">
        <span class="logo">🌍 3D词云</span>
        <div class="status-dot"></div>
        <span class="status-label">运行中</span>
    </div>
    <div class="clock" id="clock">00:00:00</div>
</div>

<!-- canvas 容器 -->
<div id="canvas-wrap"></div>

<!-- 上传面板 -->
<div class="panel" id="upload-panel" data-pid="upload">
    <div class="panel-title">
        <span>📤 上传文件</span>
        <span class="x" onclick="hidePanel('upload-panel')">×</span>
    </div>
    <p class="file-hint">支持 JSON / MD / TXT<br>最大 5 MB · 自动分词统计</p>
    <input type="file" id="file-input" accept=".json,.md,.txt" style="display:none">
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">选择文件（JSON / MD / TXT）</button>
    <div class="progress-wrap" id="prog-wrap">
        <div class="progress-bg"><div class="progress-fill" id="prog-fill">0%</div></div>
    </div>
</div>

<!-- 统计面板 -->
<div class="panel" id="stats-panel" data-pid="stats">
    <div class="panel-title">
        <span>📊 词云统计</span>
        <span class="x" onclick="hidePanel('stats-panel')">×</span>
    </div>
    <div class="stats-list" id="stats-list"><p style="color:#666;text-align:center;padding:10px 0">上传文件后显示</p></div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<!-- 磁吸图标容器 -->
<div id="snap-icons"></div>

<!-- 底部提示 -->
<div class="hint-bar">左键旋转 · 右键平移 · 滚轮缩放 · 拖面板到边缘磁吸 · 双击图标恢复 · 右键空白重置</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════
// 安全常量
// ══════════════════════════════════════════
const MAX_FILE_SIZE   = 5 * 1024 * 1024;
const MAX_CHARS       = 200000;
const MAX_WORD_LEN    = 20;
const MAX_UNIQUE_WORDS= 1000;
const PARSE_TIMEOUT   = 5000;
const SNAP_DIST       = 30;

// ══════════════════════════════════════════
// ① 实时时钟
// ══════════════════════════════════════════
function tickClock() {
    const n = new Date();
    document.getElementById('clock').textContent =
        String(n.getHours()).padStart(2,'0') + ':' +
        String(n.getMinutes()).padStart(2,'0') + ':' +
        String(n.getSeconds()).padStart(2,'0');
}
setInterval(tickClock, 1000);
tickClock();

// ══════════════════════════════════════════
// 词云颜色池（15色）
// ══════════════════════════════════════════
const COLORS = [
    '#4CAF50','#2196F3','#9C27B0','#FF9800','#F44336',
    '#00BCD4','#8BC34A','#FFEB3B','#E91E63','#009688',
    '#3F51B5','#795548','#607D8B','#CDDC39','#FF5722'
];

// ══════════════════════════════════════════
// 停用词
// ══════════════════════════════════════════
const STOP = new Set(['的','了','是','在','我','有','和','就','不','人','都',
    '一','一个','上','也','很','到','说','要','去','你','会','着','没有',
    '看','好','自己','这','那','里','才','我们','他们','可以','这个','那个',
    '这些','那些','什么','怎么','为什么','所以','因为','但是','然后','如果',
    'the','a','an','is','are','was','were','be','been','being',
    'have','has','had','do','does','did','will','would','could','should',
    'may','might','shall','can','to','of','in','on','at','by','for',
    'with','about','from','as','it','its','this','that','these','those']);

// ══════════════════════════════════════════
// ② 3D 场景
// ══════════════════════════════════════════
let scene, camera, renderer, controls, wordGroup;

const DEFAULT_WORDS = [
    {word:'人工智能',count:100},{word:'机器学习',count:90},{word:'深度学习',count:85},
    {word:'自然语言',count:80},{word:'计算机视觉',count:75},{word:'神经网络',count:70},
    {word:'大数据',count:65},{word:'云计算',count:60},{word:'区块链',count:55},
    {word:'物联网',count:50},{word:'数字化',count:45},{word:'智能体',count:42},
    {word:'生成式AI',count:40},{word:'向量数据库',count:38},{word:'提示工程',count:35},
    {word:'多模态',count:33},{word:'强化学习',count:30},{word:'知识图谱',count:28},
    {word:'边缘计算',count:25},{word:'量子计算',count:22}
];

function initScene() {
    scene    = new THREE.Scene();
    camera   = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 52), 0.1, 1000);
    camera.position.z = 5.5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight - 52);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-wrap').appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping    = true;
    controls.dampingFactor    = 0.06;
    controls.autoRotate       = true;
    controls.autoRotateSpeed  = 0.8;

    // ⑬ 鼠标交互：左键旋转 / 右键平移 / 滚轮缩放（OrbitControls 默认支持）

    // ⑫ 星空背景（5000 颗）
    buildStars();

    // 默认词云
    buildWordCloud(DEFAULT_WORDS);

    // 动画循环
    (function loop() {
        requestAnimationFrame(loop);
        controls.update();
        renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / (window.innerHeight - 52);
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight - 52);
    });
}

// ⑫ 星空
function buildStars() {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(5000 * 3);
    for (let i = 0; i < 5000 * 3; i++) pos[i] = (Math.random() - 0.5) * 300;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.85 });
    scene.add(new THREE.Points(geo, mat));
}

// ② ③ 3D 地球词云 + 随机着色
function buildWordCloud(words) {
    if (wordGroup) scene.remove(wordGroup);
    wordGroup = new THREE.Group();

    // 地球线框
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(2, 48, 48),
        new THREE.MeshBasicMaterial({ color: 0x4CAF50, transparent: true, opacity: 0.15, wireframe: true })
    );
    wordGroup.add(sphere);

    // 词语精灵
    words.forEach((item, idx) => {
        const canvas  = document.createElement('canvas');
        const ctx     = canvas.getContext('2d');
        const fs      = Math.max(28, Math.min(72, 28 + item.count / 3));
        canvas.width  = Math.ceil(ctx.measureText ? 512 : 512);
        canvas.height = 128;

        // 先量一下文字宽度
        ctx.font = `bold ${fs}px "Microsoft YaHei", Arial`;
        const tw = ctx.measureText(item.word).width;
        canvas.width = Math.ceil(tw + 20);

        ctx.font      = `bold ${fs}px "Microsoft YaHei", Arial`;
        ctx.fillStyle = COLORS[idx % COLORS.length];   // ③ 随机着色
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.word, canvas.width / 2, canvas.height / 2);

        const tex      = new THREE.CanvasTexture(canvas);
        const sprite   = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.92, depthWrite: false }));

        // 黄金角螺旋分布
        const phi   = Math.acos(1 - 2 * (idx + 0.5) / words.length);
        const theta = Math.PI * (1 + Math.sqrt(5)) * idx;
        const r     = 2.15;
        sprite.position.set(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta),
            r * Math.cos(phi)
        );
        const sc = 0.35 + (item.count / 100) * 0.5;
        const ar = canvas.width / canvas.height;
        sprite.scale.set(sc * ar, sc, 1);

        wordGroup.add(sprite);
    });
    scene.add(wordGroup);
}

// ══════════════════════════════════════════
// ⑧ 文件上传 + ⑨ 分词统计 + ⑩ 进度条 + ⑪ 提示系统
// ══════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    this.value = '';   // 允许重复上传同一文件

    // 安全：文件大小限制
    if (file.size > MAX_FILE_SIZE) {
        toast('文件过大，最大支持 5 MB', 'error'); return;
    }

    // ⑩ 进度条启动
    setProgress(0, true);

    try {
        // 模拟进度
        for (let p = 10; p <= 60; p += 10) {
            setProgress(p);
            await sleep(40);
        }

        // 读取文件（带超时）
        const text = await readWithTimeout(file, PARSE_TIMEOUT);
        setProgress(75);

        // ⑨ 安全分词
        const words = tokenize(text);
        setProgress(95);
        await sleep(50);

        // 更新词云
        buildWordCloud(words);
        updateStats(words);
        document.getElementById('stats-panel').style.display = 'block';
        setProgress(100);
        await sleep(300);

        // ⑪ 成功提示
        toast(`✅ 已加载 ${words.length} 个关键词，最高频：「${words[0]?.word}」(${words[0]?.count}次)`, 'success');

    } catch (err) {
        toast('❌ 解析失败：' + err.message, 'error');
    } finally {
        await sleep(500);
        setProgress(0, false);
    }
});

function setProgress(val, show) {
    const wrap = document.getElementById('prog-wrap');
    const fill = document.getElementById('prog-fill');
    if (show !== undefined) wrap.style.display = show ? 'block' : 'none';
    fill.style.width   = val + '%';
    fill.textContent   = val + '%';
}

// 带超时的文件读取
function readWithTimeout(file, ms) {
    return new Promise((res, rej) => {
        const reader = new FileReader();
        const tid = setTimeout(() => { reader.abort(); rej(new Error('读取超时（>' + (ms/1000) + 's）')); }, ms);
        reader.onload  = e => { clearTimeout(tid); res(e.target.result); };
        reader.onerror = () => { clearTimeout(tid); rej(new Error('文件读取失败')); };
        reader.readAsText(file, 'UTF-8');
    });
}

// ⑨ 安全分词（深度限制 + 输出限制）
function tokenize(raw) {
    if (raw.length > MAX_CHARS) raw = raw.slice(0, MAX_CHARS);

    // 去除 Markdown / JSON 符号
    raw = raw.replace(/[#`*_\[\]{}|>~]/g, ' ').replace(/https?:\/\/\S+/g, ' ');

    const freq = {};
    const tokens = raw.split(/[\s,.!?;:"'()（）《》【】、\n\r\t]+/);
    let processed = 0;

    for (const tok of tokens) {
        if (processed >= MAX_UNIQUE_WORDS) break;
        const w = tok.trim().slice(0, MAX_WORD_LEN);
        if (w.length < 2 || STOP.has(w)) continue;

        if (/[\u4e00-\u9fa5]/.test(w)) {
            // 中文：滑窗 2-gram
            for (let i = 0; i < w.length - 1; i++) {
                const bi = w.slice(i, i + 2);
                if (!STOP.has(bi)) {
                    freq[bi] = (freq[bi] || 0) + 1;
                    if (!(bi in freq)) processed++;
                }
            }
        } else {
            freq[w] = (freq[w] || 0) + 1;
            if (freq[w] === 1) processed++;
        }
    }

    return Object.entries(freq)
        .map(([word, count]) => ({ word, count }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 30);
}

// 更新统计面板
function updateStats(words) {
    document.getElementById('stats-list').innerHTML = words.map((w, i) =>
        `<div class="stats-row">
            <span class="stats-rank">${i+1}.</span>
            <span class="stats-word">${w.word}</span>
            <span class="stats-count">${w.count}</span>
        </div>`
    ).join('');
}

// ⑪ Toast 提示
let toastTimer;
function toast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast' + (type === 'error' ? ' error' : '');
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ══════════════════════════════════════════
// ④ 面板拖拽 + ⑤ 四边磁吸 + ⑥ 磁吸图标交互 + ⑦ 右键重置
// ══════════════════════════════════════════
const panelState = {};   // { pid: { el, snapped, iconEl } }

function initDrag() {
    document.querySelectorAll('.panel[data-pid]').forEach(el => {
        const pid = el.getAttribute('data-pid');
        const rect = el.getBoundingClientRect();
        panelState[pid] = { el, snapped: false, iconEl: null, ox: 0, oy: 0, dragging: false };

        el.addEventListener('mousedown', e => {
            if (e.target.classList.contains('x') || e.target.tagName === 'BUTTON') return;
            const s = panelState[pid];
            if (s.snapped) return;     // 磁吸中不允许拖动主面板
            s.dragging = true;
            const r = el.getBoundingClientRect();
            s.ox = e.clientX - r.left;
            s.oy = e.clientY - r.top;
            e.preventDefault();
        });
    });

    document.addEventListener('mousemove', e => {
        for (const pid in panelState) {
            const s = panelState[pid];
            if (!s.dragging) continue;
            const el = s.el;
            let nx = e.clientX - s.ox;
            let ny = e.clientY - s.oy;
            const W = window.innerWidth, H = window.innerHeight;
            const pw = el.offsetWidth, ph = el.offsetHeight;
            nx = Math.max(0, Math.min(W - pw, nx));
            ny = Math.max(52, Math.min(H - ph, ny));
            el.style.left   = nx + 'px';
            el.style.top    = ny + 'px';
            el.style.right  = 'auto';
            el.style.bottom = 'auto';
            checkSnap(pid, nx, ny);
        }
    });

    document.addEventListener('mouseup', () => {
        for (const pid in panelState) panelState[pid].dragging = false;
    });

    // ⑦ 右键重置
    document.addEventListener('contextmenu', e => {
        e.preventDefault();
        resetPanels();
    });
}

function checkSnap(pid, x, y) {
    const s  = panelState[pid];
    const el = s.el;
    const W  = window.innerWidth, H = window.innerHeight;
    const pw = el.offsetWidth,    ph = el.offsetHeight;

    let edge = null;
    if (x <= SNAP_DIST)             edge = 'left';
    else if (x >= W - pw - SNAP_DIST)  edge = 'right';
    else if (y <= 52 + SNAP_DIST)   edge = 'top';
    else if (y >= H - ph - SNAP_DIST)  edge = 'bottom';

    if (edge && !s.snapped) doSnap(pid, edge);
}

function doSnap(pid, edge) {
    const s  = panelState[pid];
    const el = s.el;
    s.snapped = true;
    s.snapEdge = edge;
    // 记录恢复位置
    s.restoreLeft = el.style.left;
    s.restoreTop  = el.style.top;
    el.style.display = 'none';

    // 生成磁吸图标
    const icon = document.createElement('div');
    icon.className = 'snap-icon';
    const label = pid === 'upload' ? '📤' : '📊';
    const hint  = pid === 'upload' ? '上传文件' : '查看统计';
    icon.innerHTML = `<span class="si-emoji">${label}</span><span class="si-text">${hint} · 双击恢复</span>`;

    // 位置
    const W = window.innerWidth, H = window.innerHeight;
    icon.style.position = 'fixed';
    if (edge === 'left')   { icon.style.left = '8px';  icon.style.top = '50%'; icon.style.transform = 'translateY(-50%)'; }
    if (edge === 'right')  { icon.style.right = '8px'; icon.style.top = '50%'; icon.style.transform = 'translateY(-50%)'; }
    if (edge === 'top')    { icon.style.top = '60px';  icon.style.left = '50%'; icon.style.transform = 'translateX(-50%)'; }
    if (edge === 'bottom') { icon.style.bottom = '40px'; icon.style.left = '50%'; icon.style.transform = 'translateX(-50%)'; }

    // ⑥ 双击恢复
    icon.addEventListener('dblclick', () => unsnap(pid));

    document.getElementById('snap-icons').appendChild(icon);
    s.iconEl = icon;
}

function unsnap(pid) {
    const s  = panelState[pid];
    const el = s.el;
    if (!s.snapped) return;
    s.snapped = false;
    if (s.iconEl) { s.iconEl.remove(); s.iconEl = null; }
    el.style.display = 'block';
    // 恢复到屏幕中央
    const W = window.innerWidth, H = window.innerHeight;
    el.style.left  = Math.max(0, (W - el.offsetWidth)  / 2) + 'px';
    el.style.top   = Math.max(52,(H - el.offsetHeight) / 2) + 'px';
    el.style.right = 'auto';
}

// ⑦ 右键重置所有面板
function resetPanels() {
    for (const pid in panelState) {
        const s = panelState[pid];
        if (s.snapped) unsnap(pid);
        const el = s.el;
        if (pid === 'upload') {
            el.style.left = '18px'; el.style.top = '68px'; el.style.right = 'auto';
        } else {
            el.style.right = '18px'; el.style.top = '68px'; el.style.left = 'auto';
        }
        el.style.display = 'block';
    }
}

function hidePanel(id) {
    document.getElementById(id).style.display = 'none';
}

// ══════════════════════════════════════════
// 启动
// ══════════════════════════════════════════
window.onload = function () {
    initScene();
    initDrag();
};
</script>
